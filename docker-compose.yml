services:
  learning-portal:
    build: .
    container_name: learning-portal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.learning-portal.rule=Host(`learning-portal.localhost`)"
      - "traefik.http.routers.learning-portal.entrypoints=web"
      - "traefik.http.services.learning-portal.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
